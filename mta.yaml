_schema-version: "3.2"
ID: auditapp
version: 0.0.1
modules:
- name: auditapp-destination-content
  type: com.sap.application.content
  requires:
  - name: auditapp-destination-service
    parameters:
      content-target: true
  - name: auditapp_html_repo_host
    parameters:
      service-key:
        name: auditapp_html_repo_host-key
  - name: uaa_auditapp
    parameters:
      service-key:
        name: uaa_auditapp-key
  parameters:
    content:
      subaccount:
        destinations:
        - Name: auditappliaction_auditapp_html_repo_host
          ServiceInstanceName: auditapp-html5-app-host-service
          ServiceKeyName: auditapp_html_repo_host-key
          sap.cloud.service: auditappliaction
        - Authentication: OAuth2UserTokenExchange
          Name: auditappliaction_uaa_auditapp
          ServiceInstanceName: auditapp-xsuaa-service
          ServiceKeyName: uaa_auditapp-key
          sap.cloud.service: auditappliaction
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: auditapp-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: auditapp_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - bpaauditworkflowuimodule.zip
      name: bpaauditworkflowuimodule
      target-path: resources/
- name: bpaauditworkflowuimodule
  type: html5
  path: workflow-ui-module
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: auditapp-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        subaccount:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: auditapp-destination-service
    service-plan: lite
- name: auditapp_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: auditapp-html5-app-host-service
    service-plan: app-host
- name: uaa_auditapp
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: auditapp-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
